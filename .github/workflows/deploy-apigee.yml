name: Deploy Apigee Proxy

# This triggers the pipeline automatically when code is pushed to the main branch,
# but ONLY if files inside the helloworld-proxy folder were changed.
on:
  push:
    branches:
      - main
    paths:
      - 'helloworld-proxy/**'
  
  # Allows you to manually click "Run workflow" from the GitHub UI
  workflow_dispatch: 

env:
  PROJECT_ID: apigee-490614
  PROXY_NAME: helloworld

jobs:
  deploy-proxy:
    name: Build and Deploy to Apigee
    runs-on: ubuntu-latest
    
    # Required permissions for Google Cloud Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write' 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud securely
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # OPTION 1: Service Account Key (Easier for quick testing)
          # Store your Google Cloud JSON key in GitHub Secrets as GCP_CREDENTIALS
          # credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          
          # OPTION 2: Workload Identity Federation (Recommended for Production)
          create_credentials_file: true
          workload_identity_provider: 'projects/320246485281/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'apigee-sa@apigee-490614.iam.gserviceaccount.com'
          
          # This tells the action to explicitly output an OAuth token we can use in curl
          token_format: 'access_token'

      - name: Zip Proxy Bundle
        run: |
          cd helloworld-proxy
          # Zips the apiproxy folder and places the zip in the root directory
          zip -r ../${{ env.PROXY_NAME }}.zip apiproxy

      - name: Upload and Deploy Proxy
        env:
          # Pulls the token generated by the google-github-actions/auth step
          TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          echo "1. Uploading Proxy Bundle to Apigee Control Plane..."
          
          # Upload the zip and use 'jq' to parse the JSON response and extract just the revision number
          REV=$(curl -s -X POST "https://apigee.googleapis.com/v1/organizations/${{ env.PROJECT_ID }}/apis?action=import&name=${{ env.PROXY_NAME }}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@${{ env.PROXY_NAME }}.zip" | jq -r '.revision')

          # Failsafe check
          if [ -z "$REV" ] || [ "$REV" == "null" ]; then
            echo "Error: Upload failed. Check permissions or bundle format."
            exit 1
          fi
          
          echo "Successfully uploaded as Revision: $REV"

          echo "2. Deploying Revision $REV to Model B (Shared Pool)..."
          curl -s -o /dev/null -w "%{http_code}\n" -X POST "https://apigee.googleapis.com/v1/organizations/${{ env.PROJECT_ID }}/environments/env-standard-pool/apis/${{ env.PROXY_NAME }}/revisions/$REV/deployments" \
            -H "Authorization: Bearer $TOKEN"

          echo "3. Deploying Revision $REV to Model A (Alpha Corp)..."
          curl -s -o /dev/null -w "%{http_code}\n" -X POST "https://apigee.googleapis.com/v1/organizations/${{ env.PROJECT_ID }}/environments/env-premium-alpha-corp/apis/${{ env.PROXY_NAME }}/revisions/$REV/deployments" \
            -H "Authorization: Bearer $TOKEN"

          echo "Deployment initiated successfully!"